name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

jobs:
  # === Infrastructure ===
  infra-up:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build and start services
        run: |
          docker-compose up -d --build
          sleep 30
      
      - name: Check services
        run: |
          curl -f http://localhost:8080/health || exit 1
          docker-compose ps

  # === API Tests ===
  test-api:
    needs: infra-up
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install -e ".[all]"
      
      - name: Run API tests
        run: pytest src/api/ -v --alluredir=reports/allure-api -m api
      
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-api
          path: reports/allure-api/

  # === DB Tests ===
  test-db:
    needs: infra-up
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install -e ".[all]"
      
      - name: Run DB tests
        run: pytest src/db/ -v --alluredir=reports/allure-db -m db
      
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-db
          path: reports/allure-db/

  # === UI Tests ===
  test-ui:
    needs: infra-up
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install -e ".[all]"
      
      - name: Install Playwright
        run: |
          playwright install --with-deps chromium
      
      - name: Run UI tests
        run: pytest src/ui/ -v --alluredir=reports/allure-ui -m ui
      
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-ui
          path: reports/allure-ui/

  # === Kafka Tests ===
  test-kafka:
    needs: infra-up
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: pip install -e ".[all]"
      
      - name: Run Kafka tests
        run: pytest src/kafka/ -v --alluredir=reports/allure-kafka -m kafka
      
      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-kafka
          path: reports/allure-kafka/

  # === Load Tests ===
  test-load:
    needs: infra-up
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install Locust
        run: pip install locust
      
      - name: Run load test
        run: |
          locust -f src/load/locustfile.py \
            --headless \
            --users 30 \
            --spawn-rate 5 \
            --run-time 30s \
            --host http://localhost:8080 \
            --csv reports/load
      
      - name: Upload load results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-reports
          path: reports/

  # === Allure Report ===
  allure-report:
    needs: [test-api, test-db, test-ui, test-kafka]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          path: reports/
      
      - name: Install Allure
        run: |
          curl -sL https://get.allure.io/install.sh | bash
          echo "$ALLURE_HOME/bin" >> $GITHUB_PATH
      
      - name: Generate report
        run: allure generate reports/ -o allure-report --quiet
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report

  # === Cleanup ===
  infra-down:
    needs: [allure-report, test-load]
    runs-on: ubuntu-latest
    steps:
      - name: Stop services
        run: docker-compose down -v