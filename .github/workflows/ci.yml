name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'

jobs:
  # ======================
  # LINT
  # ======================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install
        run: pip install ruff mypy
      - name: Run ruff
        run: ruff check . --output-format=github
      - name: Run mypy
        run: mypy api core config --ignore-missing-imports || true
        continue-on-error: true

  # ======================
  # UNIT TESTS
  # ======================
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install
        run: pip install -r requirements.txt
      - name: Run
        run: pytest tests/ -v --cov --cov-report=xml --cov-fail-under=70 -n auto --maxfail=5

  # ======================
  # SMOKE TESTS
  # ======================
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [unit]
    if: github.event_name != 'schedule'
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Run
        run: |
          pip install -r requirements.txt
          pytest tests/ -m smoke -v --tb=short -n auto --maxfail=5

  # ======================
  # API TESTS
  # ======================
  api:
    name: API Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [unit]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install
        run: pip install -r requirements.txt
      - name: Run
        run: pytest pipelines/api/ -v --alluredir=reports/api -n auto --maxfail=3
      - name: Upload
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-api
          path: reports/api/

  # ======================
  # DB TESTS
  # ======================
  db:
    name: DB Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [unit]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Run
        run: |
          pip install -r requirements.txt
          export DATABASE_URL=postgresql://test:test@localhost:5432/test
          pytest pipelines/db/ -m db -v --alluredir=reports/db --maxfail=3
        continue-on-error: true
      - name: Upload
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-db
          path: reports/db/

  # ======================
  # UI TESTS
  # ======================
  ui:
    name: UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [unit]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
      - name: Install
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium
      - name: Run
        run: |
          pytest pipelines/ui/ -m ui -v --alluredir=reports/ui --maxfail=3 --reruns 2
        continue-on-error: true
      - name: Upload
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-ui
          path: reports/ui/

  # ======================
  # NOTIFY
  # ======================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: [lint, unit, smoke, api, db, ui]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Telegram
        if: success()
        run: |
          [ -z "$TELEGRAM_BOT_TOKEN" ] && exit 0
          curl -s --max-time 10 -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="✅ CI PASSED%0A${{ github.repository }}%0Ahttps://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}